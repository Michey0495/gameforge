<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#000"/>

  <!-- スコア・UI上部 -->
  <text x="30" y="30" fill="#fff" font-family="monospace" font-size="14">1UP</text>
  <text x="30" y="50" fill="#fff" font-family="monospace" font-size="16" font-weight="bold">3840</text>
  <text x="350" y="30" fill="#fff" font-family="monospace" font-size="14">HIGH SCORE</text>
  <text x="370" y="50" fill="#fff" font-family="monospace" font-size="16" font-weight="bold">15200</text>

  <!-- 迷路の壁 (青いアウトライン) -->
  <g fill="none" stroke="#2121de" stroke-width="3">
    <!-- 外壁 -->
    <rect x="30" y="65" width="740" height="480" rx="5"/>

    <!-- 内部の壁構造 -->
    <!-- 上部セクション -->
    <rect x="80" y="105" width="100" height="40"/>
    <rect x="220" y="105" width="60" height="40"/>
    <rect x="320" y="65" width="60" height="80"/>
    <rect x="420" y="105" width="60" height="40"/>
    <rect x="520" y="65" width="60" height="80"/>
    <rect x="620" y="105" width="100" height="40"/>

    <!-- 中段左 -->
    <rect x="80" y="185" width="100" height="20"/>
    <rect x="220" y="185" width="60" height="80"/>
    <rect x="220" y="225" width="160" height="20"/>

    <!-- 中段右 -->
    <rect x="620" y="185" width="100" height="20"/>
    <rect x="520" y="185" width="60" height="80"/>
    <rect x="420" y="225" width="160" height="20"/>

    <!-- ゴーストハウス -->
    <rect x="310" y="265" width="180" height="80" rx="0" stroke="#ffb8ff" stroke-width="2"/>
    <line x1="370" y1="265" x2="430" y2="265" stroke="#000" stroke-width="3"/>

    <!-- 下段 -->
    <rect x="80" y="385" width="100" height="20"/>
    <rect x="80" y="445" width="40" height="40"/>
    <rect x="160" y="445" width="120" height="20"/>
    <rect x="320" y="385" width="60" height="60"/>
    <rect x="420" y="385" width="60" height="60"/>
    <rect x="520" y="445" width="120" height="20"/>
    <rect x="680" y="445" width="40" height="40"/>
    <rect x="620" y="385" width="100" height="20"/>
  </g>

  <!-- ドット（小） -->
  <g fill="#ffb897">
    <circle cx="55" cy="90" r="2.5"/>
    <circle cx="55" cy="120" r="2.5"/>
    <circle cx="55" cy="150" r="2.5"/>
    <circle cx="55" cy="180" r="2.5"/>
    <circle cx="55" cy="210" r="2.5"/>
    <circle cx="55" cy="360" r="2.5"/>
    <circle cx="55" cy="390" r="2.5"/>
    <circle cx="55" cy="420" r="2.5"/>
    <circle cx="55" cy="510" r="2.5"/>

    <circle cx="200" cy="90" r="2.5"/>
    <circle cx="200" cy="160" r="2.5"/>
    <circle cx="200" cy="210" r="2.5"/>
    <circle cx="200" cy="360" r="2.5"/>
    <circle cx="200" cy="420" r="2.5"/>
    <circle cx="200" cy="510" r="2.5"/>

    <circle cx="300" cy="90" r="2.5"/>
    <circle cx="300" cy="160" r="2.5"/>
    <circle cx="300" cy="360" r="2.5"/>
    <circle cx="300" cy="510" r="2.5"/>

    <circle cx="400" cy="160" r="2.5"/>
    <circle cx="400" cy="360" r="2.5"/>
    <circle cx="400" cy="510" r="2.5"/>

    <circle cx="500" cy="90" r="2.5"/>
    <circle cx="500" cy="160" r="2.5"/>
    <circle cx="500" cy="360" r="2.5"/>
    <circle cx="500" cy="510" r="2.5"/>

    <circle cx="600" cy="90" r="2.5"/>
    <circle cx="600" cy="160" r="2.5"/>
    <circle cx="600" cy="210" r="2.5"/>
    <circle cx="600" cy="360" r="2.5"/>
    <circle cx="600" cy="420" r="2.5"/>
    <circle cx="600" cy="510" r="2.5"/>

    <circle cx="745" cy="90" r="2.5"/>
    <circle cx="745" cy="120" r="2.5"/>
    <circle cx="745" cy="150" r="2.5"/>
    <circle cx="745" cy="180" r="2.5"/>
    <circle cx="745" cy="210" r="2.5"/>
    <circle cx="745" cy="360" r="2.5"/>
    <circle cx="745" cy="390" r="2.5"/>
    <circle cx="745" cy="420" r="2.5"/>
    <circle cx="745" cy="510" r="2.5"/>

    <!-- 横方向のドット -->
    <circle cx="90" cy="90" r="2.5"/>
    <circle cx="125" cy="90" r="2.5"/>
    <circle cx="160" cy="90" r="2.5"/>
    <circle cx="240" cy="90" r="2.5"/>
    <circle cx="270" cy="90" r="2.5"/>

    <circle cx="530" cy="90" r="2.5"/>
    <circle cx="560" cy="90" r="2.5"/>
    <circle cx="640" cy="90" r="2.5"/>
    <circle cx="675" cy="90" r="2.5"/>
    <circle cx="710" cy="90" r="2.5"/>

    <circle cx="90" cy="510" r="2.5"/>
    <circle cx="130" cy="510" r="2.5"/>
    <circle cx="240" cy="510" r="2.5"/>
    <circle cx="340" cy="510" r="2.5"/>
    <circle cx="460" cy="510" r="2.5"/>
    <circle cx="560" cy="510" r="2.5"/>
    <circle cx="670" cy="510" r="2.5"/>
    <circle cx="710" cy="510" r="2.5"/>
  </g>

  <!-- パワーエサ（大） -->
  <circle cx="55" cy="510" r="7" fill="#ffb897">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="745" cy="510" r="7" fill="#ffb897">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="270" r="7" fill="#ffb897">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="745" cy="270" r="7" fill="#ffb897">
    <animate attributeName="opacity" values="1;0.3;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- パックマン（口開け） -->
  <path d="M 260 310 L 280 295 A 22 22 0 1 1 280 325 Z" fill="#ffff00"/>

  <!-- ゴースト: 赤 (Blinky) -->
  <g transform="translate(450, 180)">
    <path d="M -18 8 L -18 -8 Q -18 -20 0 -20 Q 18 -20 18 -8 L 18 8 L 12 2 L 6 8 L 0 2 L -6 8 L -12 2 Z" fill="#ff0000"/>
    <circle cx="-6" cy="-8" r="5" fill="#fff"/>
    <circle cx="6" cy="-8" r="5" fill="#fff"/>
    <circle cx="-4" cy="-8" r="2.5" fill="#2121de"/>
    <circle cx="8" cy="-8" r="2.5" fill="#2121de"/>
  </g>

  <!-- ゴースト: ピンク (Pinky) -->
  <g transform="translate(370, 290)">
    <path d="M -18 8 L -18 -8 Q -18 -20 0 -20 Q 18 -20 18 -8 L 18 8 L 12 2 L 6 8 L 0 2 L -6 8 L -12 2 Z" fill="#ffb8ff"/>
    <circle cx="-6" cy="-8" r="5" fill="#fff"/>
    <circle cx="6" cy="-8" r="5" fill="#fff"/>
    <circle cx="-8" cy="-8" r="2.5" fill="#2121de"/>
    <circle cx="4" cy="-8" r="2.5" fill="#2121de"/>
  </g>

  <!-- ゴースト: 水色 (Inky) -->
  <g transform="translate(410, 290)">
    <path d="M -18 8 L -18 -8 Q -18 -20 0 -20 Q 18 -20 18 -8 L 18 8 L 12 2 L 6 8 L 0 2 L -6 8 L -12 2 Z" fill="#00ffff"/>
    <circle cx="-6" cy="-8" r="5" fill="#fff"/>
    <circle cx="6" cy="-8" r="5" fill="#fff"/>
    <circle cx="-4" cy="-8" r="2.5" fill="#2121de"/>
    <circle cx="8" cy="-8" r="2.5" fill="#2121de"/>
  </g>

  <!-- ゴースト: オレンジ (Clyde) -->
  <g transform="translate(500, 420)">
    <path d="M -18 8 L -18 -8 Q -18 -20 0 -20 Q 18 -20 18 -8 L 18 8 L 12 2 L 6 8 L 0 2 L -6 8 L -12 2 Z" fill="#ffb852"/>
    <circle cx="-6" cy="-8" r="5" fill="#fff"/>
    <circle cx="6" cy="-8" r="5" fill="#fff"/>
    <circle cx="-4" cy="-9" r="2.5" fill="#2121de"/>
    <circle cx="8" cy="-9" r="2.5" fill="#2121de"/>
  </g>

  <!-- フルーツ（チェリー） -->
  <circle cx="400" cy="390" r="6" fill="#ff0000"/>
  <circle cx="410" cy="385" r="6" fill="#ff0000"/>
  <path d="M 400 384 Q 405 370 410 379" fill="none" stroke="#00aa00" stroke-width="1.5"/>

  <!-- 残機表示 -->
  <g transform="translate(0, 555)">
    <path d="M 45 0 L 58 -8 A 12 12 0 1 1 58 8 Z" fill="#ffff00" transform="scale(0.8)"/>
    <path d="M 80 0 L 93 -8 A 12 12 0 1 1 93 8 Z" fill="#ffff00" transform="scale(0.8)"/>
  </g>
</svg>
