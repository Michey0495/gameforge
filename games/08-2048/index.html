<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#faf8ef;
  font-family:'Helvetica Neue','Segoe UI',Arial,sans-serif;
  color:#776e65;
  user-select:none;
  -webkit-user-select:none;
  overflow:hidden;
}

/* -- レイアウト -- */
#app{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;padding:12px;
}
.header{
  display:flex;align-items:flex-end;justify-content:space-between;
  width:100%;max-width:500px;margin-bottom:12px;
}
.title{font-size:64px;font-weight:bold;color:#776e65;line-height:1;}
.scores{display:flex;gap:6px;}
.score-box{
  background:#bbada0;border-radius:4px;
  padding:6px 16px;text-align:center;min-width:80px;
}
.score-box .label{font-size:11px;color:#eee4da;letter-spacing:1px;text-transform:uppercase;}
.score-box .value{font-size:22px;font-weight:bold;color:#fff;}
.score-add{
  position:absolute;font-size:14px;font-weight:bold;color:#776e65;
  animation:scoreFloat 600ms ease-out forwards;pointer-events:none;
}
@keyframes scoreFloat{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-40px)}
}

.controls{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:500px;margin-bottom:12px;
}
.btn{
  background:#8f7a66;color:#f9f6f2;border:none;border-radius:4px;
  padding:8px 18px;font-size:14px;font-weight:bold;cursor:pointer;
  transition:background 120ms;
}
.btn:hover{background:#9f8b77;}
.btn:active{background:#7a6658;}
.btn:disabled{opacity:0.4;cursor:default;}
.msg{font-size:13px;color:#bbada0;}

/* -- グリッド -- */
.board-wrap{
  position:relative;width:100%;max-width:500px;aspect-ratio:1/1;
  max-height:calc(100vh - 160px);max-height:calc(100dvh - 160px);
}
.board{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:#bbada0;border-radius:6px;padding:2%;
  display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
  gap:2%;
}
.cell{background:#cdc1b4;border-radius:4px;}

/* -- タイル -- */
.tile-layer{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
}
.tile{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;border-radius:4px;
  transition:top 150ms ease, left 150ms ease;
}
.tile.no-transition{transition:none;}

/* タイル出現アニメーション */
.tile.tile-new{
  animation:tileAppear 200ms ease forwards;
}
@keyframes tileAppear{
  0%{opacity:0;transform:scale(0)}
  50%{opacity:1;transform:scale(1.1)}
  100%{opacity:1;transform:scale(1)}
}

/* マージアニメーション */
.tile.tile-merged{
  animation:tilePop 200ms ease forwards;
}
@keyframes tilePop{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}

/* -- オーバーレイ -- */
.overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;opacity:0;pointer-events:none;
  transition:opacity 300ms;
}
.overlay.active{opacity:1;pointer-events:auto;}
.overlay-lose{background:rgba(238,228,218,0.73);}
.overlay-win{background:rgba(237,194,46,0.5);}
.overlay-text{font-size:48px;font-weight:bold;color:#776e65;}
.overlay-win .overlay-text{color:#f9f6f2;}
.overlay-sub{font-size:16px;margin-top:8px;color:#776e65;}
.overlay-win .overlay-sub{color:#f9f6f2;}
.overlay .btn{margin-top:20px;}

/* レスポンシブ */
@media(max-width:540px){
  .title{font-size:42px;}
  .score-box{padding:4px 10px;min-width:60px;}
  .score-box .value{font-size:16px;}
  .score-box .label{font-size:9px;}
  .btn{padding:6px 12px;font-size:12px;}
}
@media(max-height:640px){
  .header{margin-bottom:6px;}
  .controls{margin-bottom:6px;}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="label">SCORE</div>
        <div class="value" id="score-val">0</div>
      </div>
      <div class="score-box">
        <div class="label">BEST</div>
        <div class="value" id="best-val">0</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <div>
      <button class="btn" id="btn-new">New Game</button>
      <button class="btn" id="btn-undo" disabled>Undo</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
  <div class="board-wrap" id="board-wrap">
    <div class="board" id="board"></div>
    <div class="tile-layer" id="tile-layer"></div>
    <div class="overlay overlay-win" id="overlay-win">
      <div class="overlay-text">2048 達成!</div>
      <div class="overlay-sub">おめでとうございます</div>
      <button class="btn" id="btn-continue">続ける</button>
    </div>
    <div class="overlay overlay-lose" id="overlay-lose">
      <div class="overlay-text">Game Over</div>
      <div class="overlay-sub">有効な手がありません</div>
      <button class="btn" id="btn-retry">もう一度</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // -- 定数 --
  const SIZE = 4;
  const WIN_VALUE = 2048;
  const ANIM_SLIDE_MS = 150;
  const ANIM_APPEAR_MS = 200;

  // タイルの色定義
  const TILE_STYLES = {
    2:    { bg:'#eee4da', color:'#776e65', fontSize:1 },
    4:    { bg:'#ede0c8', color:'#776e65', fontSize:1 },
    8:    { bg:'#f2b179', color:'#f9f6f2', fontSize:1 },
    16:   { bg:'#f59563', color:'#f9f6f2', fontSize:1 },
    32:   { bg:'#f67c5f', color:'#f9f6f2', fontSize:1 },
    64:   { bg:'#f65e3b', color:'#f9f6f2', fontSize:1 },
    128:  { bg:'#edcf72', color:'#f9f6f2', fontSize:0.85 },
    256:  { bg:'#edcc61', color:'#f9f6f2', fontSize:0.85 },
    512:  { bg:'#edc850', color:'#f9f6f2', fontSize:0.85 },
    1024: { bg:'#edc53f', color:'#f9f6f2', fontSize:0.7 },
    2048: { bg:'#edc22e', color:'#f9f6f2', fontSize:0.7, glow:true },
  };
  const DEFAULT_STYLE = { bg:'#3c3a32', color:'#f9f6f2', fontSize:0.6 };

  // -- DOM要素 --
  const boardEl = document.getElementById('board');
  const tileLayerEl = document.getElementById('tile-layer');
  const scoreValEl = document.getElementById('score-val');
  const bestValEl = document.getElementById('best-val');
  const msgEl = document.getElementById('msg');
  const btnNew = document.getElementById('btn-new');
  const btnUndo = document.getElementById('btn-undo');
  const overlayWin = document.getElementById('overlay-win');
  const overlayLose = document.getElementById('overlay-lose');
  const btnContinue = document.getElementById('btn-continue');
  const btnRetry = document.getElementById('btn-retry');
  const boardWrap = document.getElementById('board-wrap');

  // -- ゲーム状態 --
  let grid = [];        // grid[row][col] = value or 0
  let score = 0;
  let bestScore = 0;
  let won = false;      // 2048到達済みフラグ
  let winShown = false;  // 勝利画面表示済みフラグ
  let gameOver = false;
  let tileElements = []; // DOM要素の参照用 tileElements[row][col]
  let prevState = null;  // Undo用
  let tileIdCounter = 0;
  let isAnimating = false;

  // -- 初期化 --
  function init() {
    bestScore = parseInt(localStorage.getItem('best2048') || '0', 10);
    buildBoard();
    newGame();
    bindEvents();
  }

  // 空セルのDOM生成
  function buildBoard() {
    boardEl.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        boardEl.appendChild(cell);
      }
    }
  }

  // 新規ゲーム開始
  function newGame() {
    grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    tileElements = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    score = 0;
    won = false;
    winShown = false;
    gameOver = false;
    prevState = null;
    isAnimating = false;
    tileLayerEl.innerHTML = '';
    overlayWin.classList.remove('active');
    overlayLose.classList.remove('active');
    updateScore();
    btnUndo.disabled = true;
    msgEl.textContent = '';
    spawnTile();
    spawnTile();
  }

  // -- タイルの座標・サイズ計算 --
  // ボードのpadding=2%, gap=2%, 4セル
  // セル幅 = (100% - 2%*2 - 2%*3) / 4 = (100% - 10%) / 4 = 22.5%
  // 各セルの左端: padding(2%) + col*(cellSize+gap)
  function getCellPercent() {
    const padding = 2;
    const gap = 2;
    const cellSize = (100 - padding * 2 - gap * (SIZE - 1)) / SIZE;
    return { padding, gap, cellSize };
  }

  function getTilePos(row, col) {
    const { padding, gap, cellSize } = getCellPercent();
    return {
      left: padding + col * (cellSize + gap),
      top: padding + row * (cellSize + gap),
      size: cellSize
    };
  }

  // -- タイルDOM生成 --
  function createTileEl(value, row, col, animClass) {
    const pos = getTilePos(row, col);
    const style = TILE_STYLES[value] || DEFAULT_STYLE;
    const el = document.createElement('div');
    el.className = 'tile' + (animClass ? ' ' + animClass : '');
    el.dataset.id = ++tileIdCounter;
    el.textContent = value;
    el.style.left = pos.left + '%';
    el.style.top = pos.top + '%';
    el.style.width = pos.size + '%';
    el.style.height = pos.size + '%';
    el.style.backgroundColor = style.bg;
    el.style.color = style.color;
    el.style.fontSize = 'calc(' + (pos.size * style.fontSize) + 'vmin * 0.4)';
    if (style.glow) {
      el.style.boxShadow = '0 0 20px 8px rgba(237,194,46,0.4)';
    }
    tileLayerEl.appendChild(el);
    return el;
  }

  // フォントサイズのレスポンシブ補正
  function updateTileFontSizes() {
    const wrapRect = boardWrap.getBoundingClientRect();
    const baseSize = Math.min(wrapRect.width, wrapRect.height);
    const { cellSize } = getCellPercent();
    const cellPx = baseSize * cellSize / 100;

    const tiles = tileLayerEl.querySelectorAll('.tile');
    tiles.forEach(function(el) {
      const val = parseInt(el.textContent, 10);
      const style = TILE_STYLES[val] || DEFAULT_STYLE;
      el.style.fontSize = (cellPx * style.fontSize * 0.4) + 'px';
    });
  }

  // -- タイル出現 --
  function spawnTile() {
    const emptyCells = [];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) emptyCells.push({ r, c });
      }
    }
    if (emptyCells.length === 0) return;

    const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    grid[cell.r][cell.c] = value;
    const el = createTileEl(value, cell.r, cell.c, 'tile-new');
    tileElements[cell.r][cell.c] = el;
    updateTileFontSizes();
  }

  // -- スコア更新 --
  function updateScore() {
    scoreValEl.textContent = score;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('best2048', bestScore.toString());
    }
    bestValEl.textContent = bestScore;
  }

  // スコア加算アニメーション
  function showScoreAdd(points) {
    const rect = scoreValEl.getBoundingClientRect();
    const floater = document.createElement('div');
    floater.className = 'score-add';
    floater.textContent = '+' + points;
    floater.style.left = rect.left + 'px';
    floater.style.top = rect.top + 'px';
    document.body.appendChild(floater);
    setTimeout(function() { floater.remove(); }, 600);
  }

  // -- 移動ロジック --
  // 1行/列をスライドしてマージする
  // 方向に関係なく「左方向にスライド」する形に正規化して処理
  function slideLine(line) {
    // 0を除去して詰める
    const filtered = line.filter(function(v) { return v !== 0; });
    const result = [];
    let mergeScore = 0;
    const mergedFlags = [];

    let i = 0;
    while (i < filtered.length) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        const merged = filtered[i] * 2;
        result.push(merged);
        mergedFlags.push(true);
        mergeScore += merged;
        i += 2;
      } else {
        result.push(filtered[i]);
        mergedFlags.push(false);
        i += 1;
      }
    }

    // 残りを0で埋める
    while (result.length < SIZE) {
      result.push(0);
      mergedFlags.push(false);
    }

    return { result, mergeScore, mergedFlags };
  }

  // グリッドから行/列を取得する汎用関数
  function getLine(direction, index) {
    const line = [];
    for (let i = 0; i < SIZE; i++) {
      switch (direction) {
        case 'left':  line.push(grid[index][i]); break;
        case 'right': line.push(grid[index][SIZE - 1 - i]); break;
        case 'up':    line.push(grid[i][index]); break;
        case 'down':  line.push(grid[SIZE - 1 - i][index]); break;
      }
    }
    return line;
  }

  // グリッドに行/列を戻す
  function setLine(direction, index, line) {
    for (let i = 0; i < SIZE; i++) {
      switch (direction) {
        case 'left':  grid[index][i] = line[i]; break;
        case 'right': grid[index][SIZE - 1 - i] = line[i]; break;
        case 'up':    grid[i][index] = line[i]; break;
        case 'down':  grid[SIZE - 1 - i][index] = line[i]; break;
      }
    }
  }

  // セル座標を取得(direction, lineIndex, posInLine) -> {r, c}
  function getCellCoord(direction, lineIndex, posInLine) {
    switch (direction) {
      case 'left':  return { r: lineIndex, c: posInLine };
      case 'right': return { r: lineIndex, c: SIZE - 1 - posInLine };
      case 'up':    return { r: posInLine, c: lineIndex };
      case 'down':  return { r: SIZE - 1 - posInLine, c: lineIndex };
    }
  }

  // タイルDOM要素の座標を取得(direction, lineIndex, posInLine)
  function getTileElAt(direction, lineIndex, posInLine) {
    const coord = getCellCoord(direction, lineIndex, posInLine);
    return tileElements[coord.r][coord.c];
  }

  // 移動可能かチェック（実際に動かさない）
  function canMove() {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) return true;
        if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return true;
        if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return true;
      }
    }
    return false;
  }

  // -- メイン移動処理 --
  function move(direction) {
    if (gameOver || isAnimating) return;

    // 状態保存 (Undo用)
    const savedGrid = grid.map(function(row) { return row.slice(); });
    const savedScore = score;

    let moved = false;
    let totalMergeScore = 0;

    // 各行/列の移動情報を記録
    const moveInfo = []; // {lineIndex, oldPositions[], newLine, mergedFlags}

    for (let lineIdx = 0; lineIdx < SIZE; lineIdx++) {
      const line = getLine(direction, lineIdx);

      // 元のタイルの位置を記録（0でないもの）
      const oldPositions = [];
      for (let i = 0; i < SIZE; i++) {
        if (line[i] !== 0) {
          oldPositions.push({ posInLine: i, value: line[i] });
        }
      }

      const slideResult = slideLine(line);

      // 変化があったか確認
      let lineChanged = false;
      for (let i = 0; i < SIZE; i++) {
        if (line[i] !== slideResult.result[i]) { lineChanged = true; break; }
      }

      if (lineChanged) {
        moved = true;
        totalMergeScore += slideResult.mergeScore;
      }

      moveInfo.push({
        lineIndex: lineIdx,
        oldPositions: oldPositions,
        newLine: slideResult.result,
        mergedFlags: slideResult.mergedFlags,
        changed: lineChanged
      });

      setLine(direction, lineIdx, slideResult.result);
    }

    if (!moved) return;

    // Undo用に前状態を保存
    prevState = {
      grid: savedGrid,
      score: savedScore,
      tileSnapshot: captureTileSnapshot()
    };
    btnUndo.disabled = false;

    // スコア加算
    if (totalMergeScore > 0) {
      score += totalMergeScore;
      updateScore();
      showScoreAdd(totalMergeScore);
    }

    // アニメーション実行
    animateMove(direction, moveInfo);
  }

  // タイルのスナップショットを保存（Undo復元用）
  function captureTileSnapshot() {
    const snapshot = [];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (tileElements[r][c]) {
          snapshot.push({ r, c, value: parseInt(tileElements[r][c].textContent, 10) });
        }
      }
    }
    return snapshot;
  }

  // -- アニメーション実行 --
  function animateMove(direction, moveInfo) {
    isAnimating = true;

    // 移動先の新しいタイル要素管理
    const newTileElements = Array.from({ length: SIZE }, function() { return Array(SIZE).fill(null); });
    const mergeTargets = []; // マージされたタイルの情報

    for (let li = 0; li < SIZE; li++) {
      const info = moveInfo[li];
      const oldPositions = info.oldPositions;
      const newLine = info.newLine;
      const mergedFlags = info.mergedFlags;

      // マージのマッピング: 元タイル -> 新位置
      // slideLineの挙動に対応させる
      let srcIdx = 0;
      for (let destPos = 0; destPos < SIZE; destPos++) {
        if (newLine[destPos] === 0) continue;

        const destCoord = getCellCoord(direction, li, destPos);

        if (mergedFlags[destPos]) {
          // マージ: 2つのタイルが合体
          const src1 = oldPositions[srcIdx];
          const src2 = oldPositions[srcIdx + 1];
          srcIdx += 2;

          const src1Coord = getCellCoord(direction, li, src1.posInLine);
          const src2Coord = getCellCoord(direction, li, src2.posInLine);
          const el1 = tileElements[src1Coord.r][src1Coord.c];
          const el2 = tileElements[src2Coord.r][src2Coord.c];

          // 両方を目的地に移動
          const destPosPercent = getTilePos(destCoord.r, destCoord.c);
          if (el1) {
            el1.style.left = destPosPercent.left + '%';
            el1.style.top = destPosPercent.top + '%';
          }
          if (el2) {
            el2.style.left = destPosPercent.left + '%';
            el2.style.top = destPosPercent.top + '%';
          }

          mergeTargets.push({
            r: destCoord.r, c: destCoord.c,
            value: newLine[destPos],
            oldEls: [el1, el2]
          });
        } else {
          // 単純移動
          const src = oldPositions[srcIdx];
          srcIdx += 1;

          const srcCoord = getCellCoord(direction, li, src.posInLine);
          const el = tileElements[srcCoord.r][srcCoord.c];

          const destPosPercent = getTilePos(destCoord.r, destCoord.c);
          if (el) {
            el.style.left = destPosPercent.left + '%';
            el.style.top = destPosPercent.top + '%';
            newTileElements[destCoord.r][destCoord.c] = el;
          }
        }
      }
    }

    // スライドアニメーション完了後
    setTimeout(function() {
      // マージされたタイルの古い要素を削除し、新要素を作成
      mergeTargets.forEach(function(mt) {
        mt.oldEls.forEach(function(el) {
          if (el) el.remove();
        });
        const newEl = createTileEl(mt.value, mt.r, mt.c, 'tile-merged');
        newTileElements[mt.r][mt.c] = newEl;
      });

      tileElements = newTileElements;
      updateTileFontSizes();

      // 新しいタイルを出現させる
      spawnTile();

      // 勝利/敗北チェック
      checkWinLose();

      isAnimating = false;
    }, ANIM_SLIDE_MS);
  }

  // -- 勝利/敗北チェック --
  function checkWinLose() {
    // 2048到達チェック
    if (!winShown) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] >= WIN_VALUE) {
            won = true;
            winShown = true;
            overlayWin.classList.add('active');
            return;
          }
        }
      }
    }

    // 敗北チェック
    if (!canMove()) {
      gameOver = true;
      overlayLose.classList.add('active');
    }
  }

  // -- Undo --
  function undo() {
    if (!prevState || isAnimating) return;

    grid = prevState.grid;
    score = prevState.score;
    updateScore();

    // タイルDOMを全て再描画
    tileLayerEl.innerHTML = '';
    tileElements = Array.from({ length: SIZE }, function() { return Array(SIZE).fill(null); });

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] !== 0) {
          const el = createTileEl(grid[r][c], r, c, '');
          tileElements[r][c] = el;
        }
      }
    }
    updateTileFontSizes();

    prevState = null;
    btnUndo.disabled = true;
    gameOver = false;
    overlayLose.classList.remove('active');
    msgEl.textContent = '';
  }

  // -- イベントバインド --
  function bindEvents() {
    // キーボード
    document.addEventListener('keydown', function(e) {
      const dirMap = {
        ArrowLeft: 'left', ArrowRight: 'right',
        ArrowUp: 'up', ArrowDown: 'down'
      };
      if (dirMap[e.key]) {
        e.preventDefault();
        move(dirMap[e.key]);
      }
    });

    // ボタン
    btnNew.addEventListener('click', newGame);
    btnUndo.addEventListener('click', undo);
    btnContinue.addEventListener('click', function() {
      overlayWin.classList.remove('active');
    });
    btnRetry.addEventListener('click', newGame);

    // タッチ/スワイプ
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;

    boardWrap.addEventListener('touchstart', function(e) {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchStartTime = Date.now();
      }
    }, { passive: true });

    boardWrap.addEventListener('touchend', function(e) {
      if (e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const elapsed = Date.now() - touchStartTime;

      // 最低移動距離30px、最大時間500ms
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 30 || elapsed > 500) return;

      e.preventDefault();

      if (absDx > absDy) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
    });

    // touchmoveのデフォルト動作を抑制（スクロール防止）
    boardWrap.addEventListener('touchmove', function(e) {
      e.preventDefault();
    }, { passive: false });

    // ウィンドウリサイズ時にフォントサイズ再計算
    window.addEventListener('resize', updateTileFontSizes);
  }

  // -- 起動 --
  init();
})();
</script>
</body>
</html>
