<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1e3461"/>
  <!-- Game controller body -->
  <rect x="4" y="12" width="24" height="12" rx="3" fill="#e2e8f0"/>
  <rect x="2" y="14" width="6" height="8" rx="2" fill="#e2e8f0"/>
  <rect x="24" y="14" width="6" height="8" rx="2" fill="#e2e8f0"/>
  <!-- D-pad -->
  <rect x="6" y="16" width="2" height="6" rx="0.5" fill="#1e3461"/>
  <rect x="4" y="18" width="6" height="2" rx="0.5" fill="#1e3461"/>
  <!-- Buttons -->
  <circle cx="24" cy="16" r="1.5" fill="#ef4444"/>
  <circle cx="27" cy="18" r="1.5" fill="#3b82f6"/>
  <circle cx="24" cy="20" r="1.5" fill="#22c55e"/>
  <!-- Screen/visor accent -->
  <rect x="12" y="8" width="8" height="5" rx="1" fill="#0ea5e9"/>
  <rect x="13" y="9" width="6" height="3" rx="0.5" fill="#38bdf8"/>
  <!-- Pixel accent dots on screen -->
  <rect x="14" y="9.5" width="1" height="1" fill="#1e3461"/>
  <rect x="16" y="10" width="1" height="1" fill="#1e3461"/>
  <rect x="17" y="9.5" width="1" height="1" fill="#1e3461"/>
</svg>
