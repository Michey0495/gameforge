  <ellipse cx="283" cy="192" rx="6" ry="4" fill="#333" opacity="0.4"/>

  <circle cx="350" cy="200" r="24" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <ellipse cx="343" cy="192" rx="6" ry="4" fill="#333" opacity="0.4"/>

  <circle cx="350" cy="260" r="24" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
