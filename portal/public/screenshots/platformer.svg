  <rect x="230" y="216" width="24" height="18" fill="#c84c0c"/>
  <circle cx="242" cy="216" r="12" fill="#a03808"/>
  <rect x="234" y="212" width="4" height="4" fill="#fff"/>
  <rect x="244" y="212" width="4" height="4" fill="#fff"/>
  <!-- 旗 -->
  <rect x="360" y="140" width="3" height="100" fill="#888"/>
