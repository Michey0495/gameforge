<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', 'Monaco', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  #score-bar {
    width: 500px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #111111;
    border: 1px solid #222;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
  }

  .score-label {
    font-size: 12px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .score-value {
    font-size: 28px;
    font-weight: bold;
    color: #e0e0e0;
    letter-spacing: 1px;
  }

  #current-score .score-value {
    color: #4ade80;
  }

  #high-score .score-value {
    color: #facc15;
  }

  .score-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  #game-canvas {
    border: 1px solid #222;
    border-radius: 0 0 6px 6px;
    display: block;
  }

  #controls-hint {
    margin-top: 16px;
    font-size: 11px;
    color: #444;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="score-bar">
    <div id="current-score" class="score-group">
      <span class="score-label">Score</span>
      <span class="score-value" id="score-display">0</span>
    </div>
    <div id="high-score" class="score-group">
      <span class="score-label">High Score</span>
      <span class="score-value" id="highscore-display">0</span>
    </div>
  </div>
  <canvas id="game-canvas" width="500" height="500"></canvas>
  <div id="controls-hint">
    Arrow / WASD : 移動 &nbsp;&nbsp; Space : 一時停止 &nbsp;&nbsp; R : リトライ
  </div>
</div>

<script>
(function () {
  'use strict';

  // ========================================
  // 定数
  // ========================================
  const GRID_SIZE = 20;
  const CELL_SIZE = 25;
  const CANVAS_SIZE = GRID_SIZE * CELL_SIZE;
  const INITIAL_INTERVAL = 150;
  const MIN_INTERVAL = 60;
  const INTERVAL_DECREASE = 2;
  const SCORE_PER_FOOD = 10;
  const STORAGE_KEY = 'snake_game_highscore';

  const COLOR_BG = '#0a0a0a';
  const COLOR_GRID = '#1a1a1a';
  const COLOR_HEAD = '#4ade80';
  const COLOR_BODY_BRIGHT = '#22c55e';
  const COLOR_BODY_DIM = '#14532d';
  const COLOR_FOOD = '#ef4444';
  const COLOR_FOOD_GLOW = '#f87171';
  const COLOR_TEXT = '#e0e0e0';
  const COLOR_TEXT_DIM = '#666666';
  const COLOR_OVERLAY = 'rgba(10, 10, 10, 0.85)';

  // ゲーム状態
  const STATE_START = 0;
  const STATE_PLAYING = 1;
  const STATE_PAUSED = 2;
  const STATE_GAMEOVER = 3;

  // 方向
  const DIR_UP = { x: 0, y: -1 };
  const DIR_DOWN = { x: 0, y: 1 };
  const DIR_LEFT = { x: -1, y: 0 };
  const DIR_RIGHT = { x: 1, y: 0 };

  // ========================================
  // DOM要素
  // ========================================
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('score-display');
  const highscoreDisplay = document.getElementById('highscore-display');

  // ========================================
  // Web Audio API サウンド
  // ========================================
  let audioCtx = null;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  function playEatSound() {
    try {
      const ac = getAudioContext();
      const osc1 = ac.createOscillator();
      const osc2 = ac.createOscillator();
      const gain1 = ac.createGain();
      const gain2 = ac.createGain();

      osc1.type = 'square';
      osc1.frequency.setValueAtTime(880, ac.currentTime);
      osc1.frequency.exponentialRampToValueAtTime(1320, ac.currentTime + 0.05);

      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(1200, ac.currentTime);
      osc2.frequency.exponentialRampToValueAtTime(1600, ac.currentTime + 0.04);

      gain1.gain.setValueAtTime(0.15, ac.currentTime);
      gain1.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.12);

      gain2.gain.setValueAtTime(0.08, ac.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);

      osc1.connect(gain1);
      gain1.connect(ac.destination);
      osc2.connect(gain2);
      gain2.connect(ac.destination);

      osc1.start(ac.currentTime);
      osc1.stop(ac.currentTime + 0.12);
      osc2.start(ac.currentTime);
      osc2.stop(ac.currentTime + 0.08);
    } catch (e) { /* 音声が使えない環境では無視 */ }
  }

  function playGameOverSound() {
    try {
      const ac = getAudioContext();
      const osc = ac.createOscillator();
      const gain = ac.createGain();

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(440, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.6);

      gain.gain.setValueAtTime(0.12, ac.currentTime);
      gain.gain.linearRampToValueAtTime(0.08, ac.currentTime + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.7);

      osc.connect(gain);
      gain.connect(ac.destination);

      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.7);
    } catch (e) {}
  }

  function playTickSound() {
    try {
      const ac = getAudioContext();
      const osc = ac.createOscillator();
      const gain = ac.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ac.currentTime);

      gain.gain.setValueAtTime(0.04, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.03);

      osc.connect(gain);
      gain.connect(ac.destination);

      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.03);
    } catch (e) {}
  }

  // ========================================
  // ゲーム状態管理
  // ========================================
  let state = STATE_START;
  let snake = [];
  let direction = DIR_RIGHT;
  let nextDirection = DIR_RIGHT;
  let food = { x: 0, y: 0 };
  let score = 0;
  let highScore = loadHighScore();
  let interval = INITIAL_INTERVAL;
  let lastUpdateTime = 0;
  let animationTime = 0;

  // 入力キューで高速入力を処理
  let inputQueue = [];

  function loadHighScore() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? parseInt(saved, 10) || 0 : 0;
    } catch (e) {
      return 0;
    }
  }

  function saveHighScore(val) {
    try {
      localStorage.setItem(STORAGE_KEY, String(val));
    } catch (e) {}
  }

  function initGame() {
    const startX = Math.floor(GRID_SIZE / 2);
    const startY = Math.floor(GRID_SIZE / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY }
    ];
    direction = DIR_RIGHT;
    nextDirection = DIR_RIGHT;
    inputQueue = [];
    score = 0;
    interval = INITIAL_INTERVAL;
    spawnFood();
    updateScoreDisplay();
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    const empty = [];
    for (let x = 0; x < GRID_SIZE; x++) {
      for (let y = 0; y < GRID_SIZE; y++) {
        if (!occupied.has(x + ',' + y)) {
          empty.push({ x, y });
        }
      }
    }
    if (empty.length === 0) return;
    food = empty[Math.floor(Math.random() * empty.length)];
  }

  function updateScoreDisplay() {
    scoreDisplay.textContent = score;
    highscoreDisplay.textContent = highScore;
  }

  // ========================================
  // 反転方向の判定
  // ========================================
  function isOpposite(d1, d2) {
    return d1.x + d2.x === 0 && d1.y + d2.y === 0;
  }

  // ========================================
  // ゲームロジック更新
  // ========================================
  function update() {
    // 入力キューから次の有効な方向を取り出す
    while (inputQueue.length > 0) {
      const candidate = inputQueue.shift();
      if (!isOpposite(candidate, direction)) {
        nextDirection = candidate;
        break;
      }
    }

    direction = nextDirection;

    const head = snake[0];
    const newHead = {
      x: head.x + direction.x,
      y: head.y + direction.y
    };

    // 壁衝突判定
    if (newHead.x < 0 || newHead.x >= GRID_SIZE ||
        newHead.y < 0 || newHead.y >= GRID_SIZE) {
      gameOver();
      return;
    }

    // 自己衝突判定
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
        gameOver();
        return;
      }
    }

    snake.unshift(newHead);

    // 食べ物の判定
    if (newHead.x === food.x && newHead.y === food.y) {
      score += SCORE_PER_FOOD;
      interval = Math.max(MIN_INTERVAL, interval - INTERVAL_DECREASE);
      if (score > highScore) {
        highScore = score;
        saveHighScore(highScore);
      }
      updateScoreDisplay();
      playEatSound();
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function gameOver() {
    state = STATE_GAMEOVER;
    playGameOverSound();
    if (score > highScore) {
      highScore = score;
      saveHighScore(highScore);
      updateScoreDisplay();
    }
  }

  // ========================================
  // 描画
  // ========================================
  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function lerpColor(hex1, hex2, t) {
    const r1 = parseInt(hex1.slice(1, 3), 16);
    const g1 = parseInt(hex1.slice(3, 5), 16);
    const b1 = parseInt(hex1.slice(5, 7), 16);
    const r2 = parseInt(hex2.slice(1, 3), 16);
    const g2 = parseInt(hex2.slice(3, 5), 16);
    const b2 = parseInt(hex2.slice(5, 7), 16);
    const r = Math.round(lerp(r1, r2, t));
    const g = Math.round(lerp(g1, g2, t));
    const b = Math.round(lerp(b1, b2, t));
    return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
  }

  function drawGrid() {
    ctx.fillStyle = COLOR_BG;
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    ctx.strokeStyle = COLOR_GRID;
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
      const pos = i * CELL_SIZE;
      ctx.beginPath();
      ctx.moveTo(pos, 0);
      ctx.lineTo(pos, CANVAS_SIZE);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, pos);
      ctx.lineTo(CANVAS_SIZE, pos);
      ctx.stroke();
    }
  }

  function drawSnake() {
    const len = snake.length;
    for (let i = len - 1; i >= 0; i--) {
      const seg = snake[i];
      const t = len > 1 ? i / (len - 1) : 0;
      const px = seg.x * CELL_SIZE;
      const py = seg.y * CELL_SIZE;
      const padding = 1;

      if (i === 0) {
        // 頭: 角丸の四角で少し大きめに描画
        ctx.fillStyle = COLOR_HEAD;
        ctx.shadowColor = COLOR_HEAD;
        ctx.shadowBlur = 6;
        roundRect(
          ctx,
          px + padding,
          py + padding,
          CELL_SIZE - padding * 2,
          CELL_SIZE - padding * 2,
          5
        );
        ctx.fill();
        ctx.shadowBlur = 0;

        // 目の描画
        drawEyes(seg, direction);
      } else {
        // 体: 頭に近いほど明るく、尾に近いほど暗い
        const ratio = 1 - t; // 0(頭側)=明るい, 1(尾側)=暗い
        const bodyColor = lerpColor(COLOR_BODY_BRIGHT, COLOR_BODY_DIM, ratio);
        ctx.fillStyle = bodyColor;

        const bodyPadding = lerp(1.5, 2.5, ratio);
        const radius = lerp(4, 2, ratio);
        roundRect(
          ctx,
          px + bodyPadding,
          py + bodyPadding,
          CELL_SIZE - bodyPadding * 2,
          CELL_SIZE - bodyPadding * 2,
          radius
        );
        ctx.fill();
      }
    }
  }

  function drawEyes(headSeg, dir) {
    const cx = headSeg.x * CELL_SIZE + CELL_SIZE / 2;
    const cy = headSeg.y * CELL_SIZE + CELL_SIZE / 2;

    const eyeOffsetForward = 4;
    const eyeOffsetSide = 4;
    const eyeRadius = 2.5;
    const pupilRadius = 1.2;

    // 方向に応じた目の位置
    let e1x, e1y, e2x, e2y;
    if (dir === DIR_UP) {
      e1x = cx - eyeOffsetSide; e1y = cy - eyeOffsetForward;
      e2x = cx + eyeOffsetSide; e2y = cy - eyeOffsetForward;
    } else if (dir === DIR_DOWN) {
      e1x = cx - eyeOffsetSide; e1y = cy + eyeOffsetForward;
      e2x = cx + eyeOffsetSide; e2y = cy + eyeOffsetForward;
    } else if (dir === DIR_LEFT) {
      e1x = cx - eyeOffsetForward; e1y = cy - eyeOffsetSide;
      e2x = cx - eyeOffsetForward; e2y = cy + eyeOffsetSide;
    } else {
      e1x = cx + eyeOffsetForward; e1y = cy - eyeOffsetSide;
      e2x = cx + eyeOffsetForward; e2y = cy + eyeOffsetSide;
    }

    // 白目
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(e1x, e1y, eyeRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e2x, e2y, eyeRadius, 0, Math.PI * 2);
    ctx.fill();

    // 瞳
    const pupilShiftX = dir.x * 0.8;
    const pupilShiftY = dir.y * 0.8;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(e1x + pupilShiftX, e1y + pupilShiftY, pupilRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e2x + pupilShiftX, e2y + pupilShiftY, pupilRadius, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawFood(time) {
    const px = food.x * CELL_SIZE;
    const py = food.y * CELL_SIZE;
    const centerX = px + CELL_SIZE / 2;
    const centerY = py + CELL_SIZE / 2;

    // パルスアニメーション
    const pulse = Math.sin(time * 0.004) * 0.15 + 0.85;
    const glowIntensity = Math.sin(time * 0.005) * 4 + 6;
    const radius = (CELL_SIZE / 2 - 3) * pulse;

    // 外側のグロー
    ctx.shadowColor = COLOR_FOOD_GLOW;
    ctx.shadowBlur = glowIntensity;

    // メインの円
    ctx.fillStyle = COLOR_FOOD;
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    ctx.fill();

    // ハイライト
    ctx.shadowBlur = 0;
    const highlightGrad = ctx.createRadialGradient(
      centerX - 2, centerY - 2, 0,
      centerX, centerY, radius
    );
    highlightGrad.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
    highlightGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = highlightGrad;
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  function roundRect(context, x, y, w, h, r) {
    context.beginPath();
    context.moveTo(x + r, y);
    context.lineTo(x + w - r, y);
    context.quadraticCurveTo(x + w, y, x + w, y + r);
    context.lineTo(x + w, y + h - r);
    context.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    context.lineTo(x + r, y + h);
    context.quadraticCurveTo(x, y + h, x, y + h - r);
    context.lineTo(x, y + r);
    context.quadraticCurveTo(x, y, x + r, y);
    context.closePath();
  }

  function drawOverlay(lines, subtitleLines) {
    ctx.fillStyle = COLOR_OVERLAY;
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // メインタイトル
    const titleY = CANVAS_SIZE / 2 - 40;
    ctx.fillStyle = COLOR_TEXT;
    ctx.font = 'bold 32px "Courier New", monospace';
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], CANVAS_SIZE / 2, titleY + i * 40);
    }

    // サブテキスト
    if (subtitleLines && subtitleLines.length > 0) {
      ctx.fillStyle = COLOR_TEXT_DIM;
      ctx.font = '14px "Courier New", monospace';
      const subY = titleY + lines.length * 40 + 30;
      for (let i = 0; i < subtitleLines.length; i++) {
        ctx.fillText(subtitleLines[i], CANVAS_SIZE / 2, subY + i * 24);
      }
    }
  }

  function drawStartScreen(time) {
    drawGrid();

    // 装飾的なスネーク
    const decorSnake = [
      { x: 7, y: 12 }, { x: 6, y: 12 }, { x: 5, y: 12 },
      { x: 4, y: 12 }, { x: 3, y: 12 }, { x: 3, y: 11 },
      { x: 3, y: 10 }
    ];
    const savedSnake = snake;
    const savedDir = direction;
    snake = decorSnake;
    direction = DIR_RIGHT;
    drawSnake();
    snake = savedSnake;
    direction = savedDir;

    // 装飾的な食べ物
    const savedFood = food;
    food = { x: 12, y: 12 };
    drawFood(time);
    food = savedFood;

    // テキストオーバーレイ
    ctx.fillStyle = COLOR_OVERLAY;
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // タイトル
    ctx.fillStyle = COLOR_HEAD;
    ctx.font = 'bold 36px "Courier New", monospace';
    ctx.fillText('SNAKE GAME', CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 60);

    // 日本語サブタイトル
    ctx.fillStyle = COLOR_TEXT;
    ctx.font = '18px "Courier New", monospace';
    ctx.fillText('-- \u30B9\u30CD\u30FC\u30AF\u30B2\u30FC\u30E0 --', CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 20);

    // 点滅する開始指示
    const blink = Math.sin(time * 0.003) > 0;
    if (blink) {
      ctx.fillStyle = COLOR_TEXT_DIM;
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText('Space \u3067\u958B\u59CB', CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 40);
    }

    // ハイスコア表示
    if (highScore > 0) {
      ctx.fillStyle = '#facc15';
      ctx.font = '13px "Courier New", monospace';
      ctx.fillText('HIGH SCORE: ' + highScore, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 80);
    }
  }

  function drawPausedScreen(time) {
    drawGrid();
    drawFood(time);
    drawSnake();

    ctx.fillStyle = COLOR_OVERLAY;
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = COLOR_TEXT;
    ctx.font = 'bold 28px "Courier New", monospace';
    ctx.fillText('\u4E00\u6642\u505C\u6B62', CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 10);

    const blink = Math.sin(time * 0.003) > 0;
    if (blink) {
      ctx.fillStyle = COLOR_TEXT_DIM;
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText('Space \u3067\u518D\u958B', CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 30);
    }
  }

  function drawGameOverScreen(time) {
    drawGrid();
    drawSnake();

    ctx.fillStyle = COLOR_OVERLAY;
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // ゲームオーバータイトル
    ctx.fillStyle = COLOR_FOOD;
    ctx.font = 'bold 32px "Courier New", monospace';
    ctx.fillText('GAME OVER', CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 60);

    // スコア
    ctx.fillStyle = COLOR_TEXT;
    ctx.font = '18px "Courier New", monospace';
    ctx.fillText('\u30B9\u30B3\u30A2: ' + score, CANVAS_SIZE / 2, CANVAS_SIZE / 2 - 15);

    // ハイスコア
    const isNewRecord = score >= highScore && score > 0;
    if (isNewRecord) {
      ctx.fillStyle = '#facc15';
      ctx.font = 'bold 16px "Courier New", monospace';
      ctx.fillText('NEW RECORD!', CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 15);
    } else {
      ctx.fillStyle = '#facc15';
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText('\u6700\u9AD8\u8A18\u9332: ' + highScore, CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 15);
    }

    // リトライ指示
    const blink = Math.sin(time * 0.003) > 0;
    if (blink) {
      ctx.fillStyle = COLOR_TEXT_DIM;
      ctx.font = '14px "Courier New", monospace';
      ctx.fillText('R \u3067\u30EA\u30C8\u30E9\u30A4', CANVAS_SIZE / 2, CANVAS_SIZE / 2 + 60);
    }
  }

  // ========================================
  // メインループ
  // ========================================
  function gameLoop(timestamp) {
    animationTime = timestamp;

    if (state === STATE_START) {
      drawStartScreen(timestamp);
    } else if (state === STATE_PLAYING) {
      if (timestamp - lastUpdateTime >= interval) {
        update();
        lastUpdateTime = timestamp;
      }
      if (state === STATE_PLAYING) {
        drawGrid();
        drawFood(timestamp);
        drawSnake();
      } else {
        // update内でゲームオーバーになった場合
        drawGameOverScreen(timestamp);
      }
    } else if (state === STATE_PAUSED) {
      drawPausedScreen(timestamp);
    } else if (state === STATE_GAMEOVER) {
      drawGameOverScreen(timestamp);
    }

    requestAnimationFrame(gameLoop);
  }

  // ========================================
  // 入力処理
  // ========================================
  function handleKeyDown(e) {
    const key = e.key;

    // 方向キー・WASDはスクロール防止
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight',
         'w', 'a', 's', 'd', ' '].includes(key)) {
      e.preventDefault();
    }

    switch (state) {
      case STATE_START:
        if (key === ' ') {
          initGame();
          state = STATE_PLAYING;
          lastUpdateTime = performance.now();
        }
        break;

      case STATE_PLAYING:
        handlePlayingInput(key);
        break;

      case STATE_PAUSED:
        if (key === ' ') {
          state = STATE_PLAYING;
          lastUpdateTime = performance.now();
        }
        break;

      case STATE_GAMEOVER:
        if (key === 'r' || key === 'R') {
          initGame();
          state = STATE_PLAYING;
          lastUpdateTime = performance.now();
        }
        break;
    }
  }

  function handlePlayingInput(key) {
    let newDir = null;

    switch (key) {
      case 'ArrowUp':
      case 'w':
      case 'W':
        newDir = DIR_UP;
        break;
      case 'ArrowDown':
      case 's':
      case 'S':
        newDir = DIR_DOWN;
        break;
      case 'ArrowLeft':
      case 'a':
      case 'A':
        newDir = DIR_LEFT;
        break;
      case 'ArrowRight':
      case 'd':
      case 'D':
        newDir = DIR_RIGHT;
        break;
      case ' ':
        state = STATE_PAUSED;
        return;
    }

    if (newDir) {
      // 最後にキューに入った方向（またはcurrent direction）に対して反転でなければキューに追加
      const lastQueued = inputQueue.length > 0
        ? inputQueue[inputQueue.length - 1]
        : direction;
      if (!isOpposite(newDir, lastQueued) && inputQueue.length < 3) {
        inputQueue.push(newDir);
        playTickSound();
      }
    }
  }

  document.addEventListener('keydown', handleKeyDown);

  // ========================================
  // 初期化と開始
  // ========================================
  updateScoreDisplay();
  requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
