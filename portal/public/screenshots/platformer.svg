  <rect x="180" y="170" width="28" height="28" fill="#dc8c3c" stroke="#a06830" stroke-width="2"/>
  <!-- パイプ -->
  <rect x="280" y="200" width="40" height="40" fill="#38a838" rx="2"/>
  <rect x="276" y="196" width="48" height="12" fill="#38a838" rx="2"/>
  <rect x="282" y="200" width="10" height="40" fill="rgba(255,255,255,0.15)"/>
  <!-- コイン -->
  <circle cx="135" cy="145" r="6" fill="#fcd838"/>
  <circle cx="165" cy="145" r="6" fill="#fcd838"/>
  <circle cx="195" cy="145" r="6" fill="#fcd838"/>
  <!-- プレイヤー -->
  <rect x="85" y="196" width="20" height="8" fill="#e84040"/>
  <rect x="83" y="202" width="24" height="5" fill="#e84040"/>
  <rect x="85" y="207" width="18" height="10" fill="#fcb890"/>
  <rect x="85" y="217" width="18" height="10" fill="#e84040"/>
  <rect x="85" y="227" width="8" height="5" fill="#4040c0"/>
  <rect x="96" y="227" width="8" height="5" fill="#4040c0"/>
