<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#5c94fc"/>
  <!-- 雲 -->
  <circle cx="60" cy="50" r="18" fill="rgba(255,255,255,0.5)"/>
  <circle cx="80" cy="42" r="22" fill="rgba(255,255,255,0.5)"/>
  <circle cx="105" cy="50" r="18" fill="rgba(255,255,255,0.5)"/>
  <circle cx="300" cy="70" r="14" fill="rgba(255,255,255,0.4)"/>
  <circle cx="318" cy="63" r="18" fill="rgba(255,255,255,0.4)"/>
  <circle cx="338" cy="70" r="14" fill="rgba(255,255,255,0.4)"/>
  <!-- 山 -->
  <polygon points="40,240 120,160 200,240" fill="#4a8848"/>
  <polygon points="150,240 250,180 350,240" fill="#3a7838"/>
