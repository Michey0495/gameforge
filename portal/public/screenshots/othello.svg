    <line x1="200" y1="50" x2="200" y2="530"/>
    <line x1="260" y1="50" x2="260" y2="530"/>
    <line x1="320" y1="50" x2="320" y2="530"/>
    <line x1="380" y1="50" x2="380" y2="530"/>
    <line x1="440" y1="50" x2="440" y2="530"/>
    <line x1="500" y1="50" x2="500" y2="530"/>
    <line x1="560" y1="50" x2="560" y2="530"/>

    <line x1="140" y1="110" x2="620" y2="110"/>
    <line x1="140" y1="170" x2="620" y2="170"/>
    <line x1="140" y1="230" x2="620" y2="230"/>
    <line x1="140" y1="290" x2="620" y2="290"/>
