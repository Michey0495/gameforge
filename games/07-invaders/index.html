<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPACE INVADERS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: monospace;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
// 定数・設定
// ============================================================
const CANVAS_W = 700;
const CANVAS_H = 600;
const SCALE = 1;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

const ALIEN_COLS = 11;
const ALIEN_ROWS = 5;
const ALIEN_SIZE = 12;      // ピクセルアート基本サイズ
const ALIEN_SCALE = 2.5;    // 描画倍率
const ALIEN_DRAW = ALIEN_SIZE * ALIEN_SCALE;
const ALIEN_PAD_X = 16;
const ALIEN_PAD_Y = 12;
const ALIEN_CELL_W = ALIEN_DRAW + ALIEN_PAD_X;
const ALIEN_CELL_H = ALIEN_DRAW + ALIEN_PAD_Y;

const PLAYER_W = 40;
const PLAYER_H = 20;
const PLAYER_Y = CANVAS_H - 50;
const PLAYER_SPEED = 4;

const BULLET_W = 3;
const BULLET_H = 10;
const BULLET_SPEED = 7;

const ALIEN_BULLET_W = 3;
const ALIEN_BULLET_H = 12;
const ALIEN_BULLET_SPEED = 3.5;

const BARRIER_BLOCK = 4;
const BARRIER_COUNT = 4;
const BARRIER_Y = PLAYER_Y - 70;

const UFO_W = 40;
const UFO_H = 16;
const UFO_SPEED = 2;
const UFO_SCORES = [50, 100, 100, 150, 150, 200, 300];

const COLOR_GREEN   = '#33ff33';
const COLOR_WHITE   = '#ffffff';
const COLOR_RED     = '#ff3333';
const COLOR_CYAN    = '#33ffff';
const COLOR_YELLOW  = '#ffff33';
const COLOR_MAGENTA = '#ff33ff';

// ============================================================
// ピクセルアートデータ（12x8 グリッド、2フレーム）
// ============================================================
// 小型エイリアン（最上段、30点）
const ALIEN_SMALL = [
  // Frame 0
  [
    '....1111....',
    '..11111111..',
    '.1111111111.',
    '.11.1111.11.',
    '.1111111111.',
    '...11..11...',
    '..11.11.11..',
    '.11......11.',
  ],
  // Frame 1
  [
    '....1111....',
    '..11111111..',
    '.1111111111.',
    '.11.1111.11.',
    '.1111111111.',
    '..1..11..1..',
    '.1.11..11.1.',
    '..1......1..',
  ]
];

// 中型エイリアン（中2段、20点）
const ALIEN_MEDIUM = [
  // Frame 0
  [
    '..1......1..',
    '...1....1...',
    '..1111111...',
    '.11.11111.1.',
    '111111111111',
    '1.1111111.11',
    '1.1......1.1',
    '...11..11...',
  ],
  // Frame 1
  [
    '..1......1..',
    '1..1....1..1',
    '1.1111111..1',
    '111.11111.11',
    '111111111111',
    '.11111111.1.',
    '..1......1..',
    '..1......1..',
  ]
];

// 大型エイリアン（下2段、10点）
const ALIEN_LARGE = [
  // Frame 0
  [
    '....1111....',
    '.1111111111.',
    '111111111111',
    '111..11..111',
    '111111111111',
    '..111..111..',
    '.11..11..11.',
    '11........11',
  ],
  // Frame 1
  [
    '....1111....',
    '.1111111111.',
    '111111111111',
    '111..11..111',
    '111111111111',
    '..111..111..',
    '.11.1111.11.',
    '..11....11..',
  ]
];

// UFO ピクセルアート（16x7）
const UFO_PIXELS = [
  '......1111......',
  '....11111111....',
  '..111111111111..',
  '.11.11.11.11.11.',
  '1111111111111111',
  '..111..11..111..',
  '...1........1...',
];

// プレイヤー砲台ピクセルアート（15x8）
const PLAYER_PIXELS = [
  '.......1.......',
  '......111......',
  '......111......',
  '.1111111111111.',
  '111111111111111',
  '111111111111111',
  '111111111111111',
  '.1111111111111.',
];

// ============================================================
// 音声（Web Audio API）
// ============================================================
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playShoot() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.15);
}

function playExplosion() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const gain = audioCtx.createGain();
  source.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  source.start();
}

function playPlayerHit() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.5;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(300, audioCtx.currentTime);
  const gain = audioCtx.createGain();
  source.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  source.start();
}

let ufoOsc = null;
let ufoGain = null;

function startUfoSound() {
  if (!audioCtx) return;
  stopUfoSound();
  ufoOsc = audioCtx.createOscillator();
  ufoGain = audioCtx.createGain();
  ufoOsc.connect(ufoGain);
  ufoGain.connect(audioCtx.destination);
  ufoOsc.type = 'sine';
  ufoGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  // 周期的な周波数変調
  ufoOsc.frequency.setValueAtTime(400, audioCtx.currentTime);
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.setValueAtTime(6, audioCtx.currentTime);
  lfoGain.gain.setValueAtTime(100, audioCtx.currentTime);
  lfo.connect(lfoGain);
  lfoGain.connect(ufoOsc.frequency);
  lfo.start();
  ufoOsc.start();
  ufoOsc._lfo = lfo;
}

function stopUfoSound() {
  if (ufoOsc) {
    try {
      ufoOsc._lfo && ufoOsc._lfo.stop();
      ufoOsc.stop();
    } catch(e) {}
    ufoOsc = null;
  }
}

// エイリアン行進音 4段階
const MARCH_NOTES = [55, 49, 46, 41]; // 4音の下降ベース
let marchNoteIndex = 0;

function playMarch() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(MARCH_NOTES[marchNoteIndex], audioCtx.currentTime);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.08);
  marchNoteIndex = (marchNoteIndex + 1) % MARCH_NOTES.length;
}

// ============================================================
// ゲーム状態
// ============================================================
const STATE_TITLE = 0;
const STATE_PLAYING = 1;
const STATE_GAMEOVER = 2;
const STATE_STAGE_CLEAR = 3;
const STATE_PLAYER_HIT = 4;

let gameState = STATE_TITLE;
let score = 0;
let highScore = parseInt(localStorage.getItem('invaders_hi') || '0', 10);
let lives = 3;
let stage = 1;

// 入力
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) {
    e.preventDefault();
  }
  // タイトル画面・ゲームオーバー画面でのスタート
  if (e.code === 'Space' || e.code === 'Enter') {
    initAudio();
    if (gameState === STATE_TITLE) {
      startGame();
    } else if (gameState === STATE_GAMEOVER) {
      gameState = STATE_TITLE;
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============================================================
// ゲームオブジェクト
// ============================================================
let player = null;
let playerBullet = null;
let aliens = [];
let alienBullets = [];
let barriers = [];
let ufo = null;
let explosions = [];

let alienDir = 1;        // 1=右, -1=左
let alienSpeedX = 1;
let alienDropAmount = 0;
let alienMoveTimer = 0;
let alienMoveInterval = 45; // フレーム間隔
let alienFrame = 0;         // アニメフレーム
let alienFireTimer = 0;
let alienFireInterval = 60;

let ufoTimer = 0;
let ufoInterval = 600;

let stageClearTimer = 0;
let playerHitTimer = 0;

// ============================================================
// 初期化
// ============================================================
function startGame() {
  score = 0;
  lives = 3;
  stage = 1;
  gameState = STATE_PLAYING;
  keys['Space'] = false;
  initStage();
}

function initStage() {
  player = { x: CANVAS_W / 2, y: PLAYER_Y, w: PLAYER_W, h: PLAYER_H };
  playerBullet = null;
  alienBullets = [];
  explosions = [];
  ufo = null;
  stopUfoSound();

  alienDir = 1;
  alienFrame = 0;
  alienMoveTimer = 0;
  alienFireTimer = 0;
  ufoTimer = 0;
  marchNoteIndex = 0;

  initAliens();
  initBarriers();
  recalcAlienSpeed();
}

function initAliens() {
  aliens = [];
  const startX = (CANVAS_W - (ALIEN_COLS * ALIEN_CELL_W)) / 2 + ALIEN_PAD_X / 2;
  const startY = 80;

  for (let row = 0; row < ALIEN_ROWS; row++) {
    for (let col = 0; col < ALIEN_COLS; col++) {
      let type, points, color, pixels;
      if (row === 0) {
        type = 'small';
        points = 30;
        color = COLOR_MAGENTA;
        pixels = ALIEN_SMALL;
      } else if (row <= 2) {
        type = 'medium';
        points = 20;
        color = COLOR_CYAN;
        pixels = ALIEN_MEDIUM;
      } else {
        type = 'large';
        points = 10;
        color = COLOR_GREEN;
        pixels = ALIEN_LARGE;
      }
      aliens.push({
        x: startX + col * ALIEN_CELL_W,
        y: startY + row * ALIEN_CELL_H,
        w: ALIEN_DRAW,
        h: (8 * ALIEN_SCALE),
        type,
        points,
        color,
        pixels,
        alive: true,
        row,
        col,
        baseX: startX + col * ALIEN_CELL_W,
        baseY: startY + row * ALIEN_CELL_H,
      });
    }
  }
}

function initBarriers() {
  barriers = [];
  const barrierW = 44;
  const barrierH = 32;
  const spacing = CANVAS_W / (BARRIER_COUNT + 1);

  // バリアの形状（ブロック単位）
  const shape = [
    '..111111111..',
    '.11111111111.',
    '1111111111111',
    '1111111111111',
    '1111111111111',
    '1111111111111',
    '1111.....1111',
    '111.......111',
    '11.........11',
  ];

  // ブロックサイズを調整
  const blockW = BARRIER_BLOCK;
  const blockH = BARRIER_BLOCK;

  for (let i = 0; i < BARRIER_COUNT; i++) {
    const bx = spacing * (i + 1) - (shape[0].length * blockW) / 2;
    const by = BARRIER_Y;

    for (let r = 0; r < shape.length; r++) {
      for (let c = 0; c < shape[r].length; c++) {
        if (shape[r][c] === '1') {
          barriers.push({
            x: bx + c * blockW,
            y: by + r * blockH,
            w: blockW,
            h: blockH,
          });
        }
      }
    }
  }
}

function recalcAlienSpeed() {
  const aliveCount = aliens.filter(a => a.alive).length;
  if (aliveCount <= 0) return;

  // エイリアンが少ないほど速い
  const ratio = aliveCount / (ALIEN_ROWS * ALIEN_COLS);
  const baseInterval = Math.max(6, 45 - (stage - 1) * 4);

  if (aliveCount === 1) {
    alienMoveInterval = 2;
  } else if (aliveCount <= 5) {
    alienMoveInterval = Math.max(3, baseInterval * 0.15);
  } else if (aliveCount <= 10) {
    alienMoveInterval = Math.max(4, baseInterval * 0.3);
  } else {
    alienMoveInterval = Math.max(5, Math.floor(baseInterval * ratio));
  }

  alienSpeedX = aliveCount <= 5 ? 4 : aliveCount <= 15 ? 3 : 2;
  alienFireInterval = Math.max(15, Math.floor(60 * ratio) - (stage - 1) * 3);
}

// ============================================================
// ピクセルアート描画
// ============================================================
function drawPixelArt(pixels, x, y, color, scale) {
  ctx.fillStyle = color;
  for (let r = 0; r < pixels.length; r++) {
    for (let c = 0; c < pixels[r].length; c++) {
      if (pixels[r][c] === '1') {
        ctx.fillRect(
          Math.floor(x + c * scale),
          Math.floor(y + r * scale),
          Math.ceil(scale),
          Math.ceil(scale)
        );
      }
    }
  }
}

// ============================================================
// 更新ロジック
// ============================================================
function update() {
  if (gameState === STATE_STAGE_CLEAR) {
    stageClearTimer--;
    if (stageClearTimer <= 0) {
      stage++;
      initStage();
      gameState = STATE_PLAYING;
    }
    return;
  }

  if (gameState === STATE_PLAYER_HIT) {
    playerHitTimer--;
    if (playerHitTimer <= 0) {
      if (lives <= 0) {
        gameState = STATE_GAMEOVER;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('invaders_hi', String(highScore));
        }
      } else {
        player.x = CANVAS_W / 2;
        playerBullet = null;
        alienBullets = [];
        gameState = STATE_PLAYING;
      }
    }
    updateExplosions();
    return;
  }

  if (gameState !== STATE_PLAYING) return;

  updatePlayer();
  updatePlayerBullet();
  updateAliens();
  updateAlienFiring();
  updateAlienBullets();
  updateUfo();
  updateExplosions();
  checkBarrierAlienCollision();

  // ステージクリア判定
  if (aliens.filter(a => a.alive).length === 0) {
    gameState = STATE_STAGE_CLEAR;
    stageClearTimer = 90;
    stopUfoSound();
  }
}

function updatePlayer() {
  if (keys['ArrowLeft'] || keys['KeyA']) {
    player.x = Math.max(player.w / 2 + 10, player.x - PLAYER_SPEED);
  }
  if (keys['ArrowRight'] || keys['KeyD']) {
    player.x = Math.min(CANVAS_W - player.w / 2 - 10, player.x + PLAYER_SPEED);
  }
  if (keys['Space'] && !playerBullet) {
    playerBullet = {
      x: player.x - BULLET_W / 2,
      y: player.y - BULLET_H,
      w: BULLET_W,
      h: BULLET_H,
    };
    playShoot();
  }
}

function updatePlayerBullet() {
  if (!playerBullet) return;
  playerBullet.y -= BULLET_SPEED;

  if (playerBullet.y + playerBullet.h < 0) {
    playerBullet = null;
    return;
  }

  // エイリアンとの当たり判定
  for (const alien of aliens) {
    if (!alien.alive) continue;
    if (rectsOverlap(playerBullet, alien)) {
      alien.alive = false;
      score += alien.points;
      explosions.push({ x: alien.x, y: alien.y, w: alien.w, h: alien.h, timer: 15, color: alien.color });
      playExplosion();
      playerBullet = null;
      recalcAlienSpeed();
      return;
    }
  }

  // UFOとの当たり判定
  if (ufo && playerBullet && rectsOverlap(playerBullet, ufo)) {
    const ufoScore = UFO_SCORES[Math.floor(Math.random() * UFO_SCORES.length)];
    score += ufoScore;
    explosions.push({ x: ufo.x, y: ufo.y, w: ufo.w, h: ufo.h, timer: 30, color: COLOR_RED, text: String(ufoScore) });
    playExplosion();
    stopUfoSound();
    ufo = null;
    playerBullet = null;
    return;
  }

  // バリアとの当たり判定
  if (playerBullet) {
    for (let i = barriers.length - 1; i >= 0; i--) {
      if (rectsOverlap(playerBullet, barriers[i])) {
        // 弾が当たった周辺のブロックも少し壊す
        destroyBarrierArea(barriers[i].x, barriers[i].y, 6);
        playerBullet = null;
        return;
      }
    }
  }
}

function updateAliens() {
  alienMoveTimer++;
  if (alienMoveTimer < alienMoveInterval) return;
  alienMoveTimer = 0;

  playMarch();
  alienFrame = 1 - alienFrame;

  const alive = aliens.filter(a => a.alive);
  if (alive.length === 0) return;

  // 移動処理
  let needDrop = false;
  const nextPositions = alive.map(a => a.x + alienDir * alienSpeedX);

  for (let i = 0; i < alive.length; i++) {
    const nx = nextPositions[i];
    if (nx < 10 || nx + alive[i].w > CANVAS_W - 10) {
      needDrop = true;
      break;
    }
  }

  if (needDrop) {
    alienDir *= -1;
    for (const a of alive) {
      a.y += ALIEN_CELL_H * 0.4;
    }
    // エイリアンが下端に到達したらゲームオーバー
    for (const a of alive) {
      if (a.y + a.h >= PLAYER_Y) {
        triggerGameOver();
        return;
      }
    }
  } else {
    for (const a of alive) {
      a.x += alienDir * alienSpeedX;
    }
  }

}

function updateAlienFiring() {
  alienFireTimer++;
  if (alienFireTimer >= alienFireInterval) {
    alienFireTimer = 0;
    fireAlienBullet();
  }
}

function fireAlienBullet() {
  const alive = aliens.filter(a => a.alive);
  if (alive.length === 0) return;

  // 各列の最下段エイリアンから射撃
  const bottomAliens = [];
  const colMap = {};
  for (const a of alive) {
    if (!colMap[a.col] || a.row > colMap[a.col].row) {
      colMap[a.col] = a;
    }
  }
  for (const col in colMap) {
    bottomAliens.push(colMap[col]);
  }

  if (bottomAliens.length > 0) {
    const shooter = bottomAliens[Math.floor(Math.random() * bottomAliens.length)];
    alienBullets.push({
      x: shooter.x + shooter.w / 2 - ALIEN_BULLET_W / 2,
      y: shooter.y + shooter.h,
      w: ALIEN_BULLET_W,
      h: ALIEN_BULLET_H,
      wiggle: Math.random() > 0.5,
      wigglePhase: 0,
    });
  }
}

function updateAlienBullets() {
  for (let i = alienBullets.length - 1; i >= 0; i--) {
    const b = alienBullets[i];
    b.y += ALIEN_BULLET_SPEED;

    if (b.wiggle) {
      b.wigglePhase += 0.3;
      b.x += Math.sin(b.wigglePhase) * 0.5;
    }

    // 画面外
    if (b.y > CANVAS_H) {
      alienBullets.splice(i, 1);
      continue;
    }

    // プレイヤーとの当たり判定
    const playerRect = {
      x: player.x - player.w / 2,
      y: player.y,
      w: player.w,
      h: player.h,
    };
    if (rectsOverlap(b, playerRect)) {
      alienBullets.splice(i, 1);
      hitPlayer();
      continue;
    }

    // バリアとの当たり判定
    let hit = false;
    for (let j = barriers.length - 1; j >= 0; j--) {
      if (rectsOverlap(b, barriers[j])) {
        destroyBarrierArea(barriers[j].x, barriers[j].y, 6);
        alienBullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;
  }
}

function updateUfo() {
  if (!ufo) {
    ufoTimer++;
    if (ufoTimer >= ufoInterval) {
      ufoTimer = 0;
      ufoInterval = 500 + Math.floor(Math.random() * 400);
      const dir = Math.random() > 0.5 ? 1 : -1;
      ufo = {
        x: dir === 1 ? -UFO_W : CANVAS_W,
        y: 40,
        w: UFO_W,
        h: UFO_H,
        dir,
      };
      startUfoSound();
    }
  } else {
    ufo.x += ufo.dir * UFO_SPEED;
    if (ufo.x > CANVAS_W + UFO_W || ufo.x < -UFO_W * 2) {
      stopUfoSound();
      ufo = null;
    }
  }
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].timer--;
    if (explosions[i].timer <= 0) {
      explosions.splice(i, 1);
    }
  }
}

function hitPlayer() {
  lives--;
  playPlayerHit();
  explosions.push({
    x: player.x - player.w / 2,
    y: player.y,
    w: player.w,
    h: player.h,
    timer: 40,
    color: COLOR_GREEN,
  });
  gameState = STATE_PLAYER_HIT;
  playerHitTimer = 60;
  stopUfoSound();
  if (ufo) ufo = null;
}

function triggerGameOver() {
  lives = 0;
  gameState = STATE_GAMEOVER;
  stopUfoSound();
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('invaders_hi', String(highScore));
  }
}

function checkBarrierAlienCollision() {
  const alive = aliens.filter(a => a.alive);
  for (const a of alive) {
    for (let i = barriers.length - 1; i >= 0; i--) {
      if (rectsOverlap(a, barriers[i])) {
        barriers.splice(i, 1);
      }
    }
  }
}

function destroyBarrierArea(cx, cy, radius) {
  for (let i = barriers.length - 1; i >= 0; i--) {
    const b = barriers[i];
    const dx = (b.x + b.w / 2) - cx;
    const dy = (b.y + b.h / 2) - cy;
    if (Math.sqrt(dx * dx + dy * dy) < radius) {
      barriers.splice(i, 1);
    }
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
// 描画
// ============================================================
function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (gameState === STATE_TITLE) {
    drawTitle();
    return;
  }

  if (gameState === STATE_GAMEOVER) {
    drawGame();
    drawGameOver();
    return;
  }

  drawGame();

  if (gameState === STATE_STAGE_CLEAR) {
    drawStageClear();
  }
}

function drawTitle() {
  // タイトルロゴ
  ctx.fillStyle = COLOR_WHITE;
  ctx.font = '36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPACE INVADERS', CANVAS_W / 2, 140);

  ctx.fillStyle = COLOR_GREEN;
  ctx.font = '22px monospace';
  ctx.fillText('--- スペースインベーダー ---', CANVAS_W / 2, 185);

  ctx.fillStyle = COLOR_WHITE;
  ctx.font = '18px monospace';
  ctx.fillText('-- SCORE TABLE --', CANVAS_W / 2, 230);

  // スコアテーブル
  const tableY = 270;
  const tableX = CANVAS_W / 2 - 100;
  drawPixelArt(UFO_PIXELS, tableX - 30, tableY - 6, COLOR_RED, 2);
  ctx.fillStyle = COLOR_WHITE;
  ctx.textAlign = 'left';
  ctx.font = '16px monospace';
  ctx.fillText('= ? MYSTERY', tableX + 20, tableY + 8);

  drawPixelArt(ALIEN_SMALL[0], tableX - 20, tableY + 30, COLOR_MAGENTA, 2);
  ctx.fillStyle = COLOR_WHITE;
  ctx.fillText('= 30 POINTS', tableX + 20, tableY + 48);

  drawPixelArt(ALIEN_MEDIUM[0], tableX - 20, tableY + 70, COLOR_CYAN, 2);
  ctx.fillStyle = COLOR_WHITE;
  ctx.fillText('= 20 POINTS', tableX + 20, tableY + 88);

  drawPixelArt(ALIEN_LARGE[0], tableX - 20, tableY + 110, COLOR_GREEN, 2);
  ctx.fillStyle = COLOR_WHITE;
  ctx.fillText('= 10 POINTS', tableX + 20, tableY + 128);

  // 操作説明
  ctx.fillStyle = COLOR_GREEN;
  ctx.textAlign = 'center';
  ctx.font = '16px monospace';
  ctx.fillText('[SPACE] START / SHOOT', CANVAS_W / 2, 470);
  ctx.fillText('[LEFT/RIGHT] MOVE', CANVAS_W / 2, 500);

  // 点滅テキスト
  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.fillStyle = COLOR_WHITE;
    ctx.font = '22px monospace';
    ctx.fillText('PRESS SPACE TO START', CANVAS_W / 2, 550);
  }

  // ハイスコア
  ctx.fillStyle = COLOR_RED;
  ctx.font = '14px monospace';
  ctx.fillText('HI-SCORE: ' + String(highScore).padStart(5, '0'), CANVAS_W / 2, 120);
}

function drawGame() {
  drawHUD();
  drawBarriers();
  drawAliens();
  drawPlayer();
  drawPlayerBullet();
  drawAlienBullets();
  drawUfo();
  drawExplosions();
  drawLives();
  drawGround();
}

function drawHUD() {
  ctx.fillStyle = COLOR_WHITE;
  ctx.font = '16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE', 20, 24);
  ctx.fillText(String(score).padStart(5, '0'), 20, 44);

  ctx.textAlign = 'center';
  ctx.fillText('HI-SCORE', CANVAS_W / 2, 24);
  ctx.fillText(String(Math.max(score, highScore)).padStart(5, '0'), CANVAS_W / 2, 44);

  ctx.textAlign = 'right';
  ctx.fillStyle = COLOR_GREEN;
  ctx.fillText('STAGE ' + stage, CANVAS_W - 20, 24);
}

function drawAliens() {
  for (const a of aliens) {
    if (!a.alive) continue;
    drawPixelArt(a.pixels[alienFrame], a.x, a.y, a.color, ALIEN_SCALE);
  }
}

function drawPlayer() {
  if (gameState === STATE_PLAYER_HIT) return;
  drawPixelArt(PLAYER_PIXELS, player.x - player.w / 2 + 1, player.y, COLOR_GREEN, PLAYER_W / 15);
}

function drawPlayerBullet() {
  if (!playerBullet) return;
  ctx.fillStyle = COLOR_WHITE;
  ctx.fillRect(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h);
}

function drawAlienBullets() {
  for (const b of alienBullets) {
    ctx.fillStyle = COLOR_WHITE;
    if (b.wiggle) {
      // ジグザグ弾
      for (let i = 0; i < b.h; i += 3) {
        const offset = ((Math.floor(i / 3) + Math.floor(b.wigglePhase)) % 2) * 2 - 1;
        ctx.fillRect(b.x + offset, b.y + i, b.w, 3);
      }
    } else {
      // 直線弾
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillRect(b.x - 1, b.y + 2, b.w + 2, 2);
      ctx.fillRect(b.x - 1, b.y + b.h - 4, b.w + 2, 2);
    }
  }
}

function drawUfo() {
  if (!ufo) return;
  drawPixelArt(UFO_PIXELS, ufo.x, ufo.y, COLOR_RED, UFO_W / 16);
}

function drawBarriers() {
  ctx.fillStyle = COLOR_GREEN;
  for (const b of barriers) {
    ctx.fillRect(b.x, b.y, b.w, b.h);
  }
}

function drawExplosions() {
  for (const e of explosions) {
    const progress = 1 - e.timer / 30;

    if (e.text) {
      // UFO撃破時のスコア表示
      ctx.fillStyle = COLOR_WHITE;
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.text, e.x + e.w / 2, e.y + e.h / 2 + 5);
    } else {
      // 爆発エフェクト
      ctx.fillStyle = e.color || COLOR_WHITE;
      const cx = e.x + e.w / 2;
      const cy = e.y + e.h / 2;
      const particleCount = 8;
      for (let i = 0; i < particleCount; i++) {
        const angle = (i / particleCount) * Math.PI * 2;
        const dist = progress * 15;
        const px = cx + Math.cos(angle) * dist;
        const py = cy + Math.sin(angle) * dist;
        const size = 3 * (1 - progress);
        ctx.fillRect(px - size / 2, py - size / 2, size, size);
      }
    }
  }
}

function drawLives() {
  ctx.fillStyle = COLOR_WHITE;
  ctx.font = '14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(String(lives), 20, CANVAS_H - 12);

  for (let i = 0; i < lives - 1; i++) {
    drawPixelArt(PLAYER_PIXELS, 50 + i * 45, CANVAS_H - 26, COLOR_GREEN, 2);
  }
}

function drawGround() {
  ctx.fillStyle = COLOR_GREEN;
  ctx.fillRect(10, CANVAS_H - 32, CANVAS_W - 20, 1);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.fillStyle = COLOR_RED;
  ctx.font = '40px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', CANVAS_W / 2, CANVAS_H / 2 - 20);

  ctx.fillStyle = COLOR_WHITE;
  ctx.font = '16px monospace';
  ctx.fillText('SCORE: ' + String(score).padStart(5, '0'), CANVAS_W / 2, CANVAS_H / 2 + 30);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = COLOR_YELLOW;
    ctx.fillText('NEW HI-SCORE!', CANVAS_W / 2, CANVAS_H / 2 + 60);
  }

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.fillStyle = COLOR_GREEN;
    ctx.font = '18px monospace';
    ctx.fillText('PRESS SPACE', CANVAS_W / 2, CANVAS_H / 2 + 110);
  }
}

function drawStageClear() {
  ctx.fillStyle = COLOR_WHITE;
  ctx.font = '32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + stage + ' CLEAR', CANVAS_W / 2, CANVAS_H / 2);
}

// ============================================================
// メインループ
// ============================================================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
